<!DOCTYPE html>
<html>
<head>
  <title>Boston Hospital Finder</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    #header { background: #003087; color: white; padding: 16px 24px; }
    #header h1 { font-size: 22px; }
    #header p  { font-size: 13px; opacity: 0.8; margin-top: 4px; }
    #controls {
      background: white; padding: 14px 24px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
      border-bottom: 1px solid #ddd;
    }
    input, select, button {
      padding: 8px 12px; font-size: 15px;
      border: 1px solid #ccc; border-radius: 4px;
    }
    button { background: #003087; color: white; border: none; cursor: pointer; }
    button:hover { background: #00205b; }
    #main { display: flex; height: calc(100vh - 110px); }
    #map { flex: 1; }
    #sidebar {
      width: 320px; background: white;
      border-left: 1px solid #ddd;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #sidebar-header {
      padding: 12px 16px; background: #f9f9f9;
      border-bottom: 1px solid #ddd; font-size: 13px; color: #555;
    }
    #results { overflow-y: auto; flex: 1; padding: 10px; }
    #loading { display: none; padding: 20px; text-align: center; color: #555; font-size: 14px; }
    .hospital-card {
      border: 1px solid #ddd; border-radius: 6px;
      padding: 10px 12px; margin-bottom: 8px;
      cursor: pointer; transition: border-color 0.2s;
    }
    .hospital-card:hover { border-color: #003087; }
    .hospital-card.active { border-color: #003087; background: #f0f4ff; }
    .hospital-name { font-weight: bold; font-size: 14px; }
    .hospital-meta { font-size: 12px; color: #666; margin-top: 3px; }
    .dist-badge {
      display: inline-block; background: #003087; color: white;
      border-radius: 10px; padding: 1px 8px; font-size: 11px; margin-left: 6px;
    }
    /* Ticket 2 popup styles */
    .popup-wrap { font-family: Arial, sans-serif; font-size: 13px; min-width: 200px; }
    .popup-name { font-weight: bold; font-size: 15px; color: #003087; margin-bottom: 4px; }
    .popup-addr { color: #555; margin-bottom: 8px; }
    .popup-section { font-weight: bold; margin-bottom: 4px; border-top: 1px solid #eee; padding-top: 6px; }
    .popup-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
    .popup-label { color: #666; }
    .popup-val { font-weight: bold; color: #222; }
    .vuln-bar-wrap { margin-top: 6px; }
    .vuln-bar-bg { background: #e0e0e0; border-radius: 4px; height: 8px; width: 100%; }
    .vuln-bar-fill { background: #c0392b; border-radius: 4px; height: 8px; }
    .vuln-label { font-size: 11px; color: #888; margin-top: 2px; }
    .no-vuln { color: #aaa; font-style: italic; font-size: 12px; }
    .vuln-row { margin-bottom: 7px; }
    .vuln-row-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 2px; }
    .vuln-row-label { color: #444; }
    .vuln-row-pct { font-weight: bold; color: #003087; }
    .bar-track { background: #e8edf5; border-radius: 4px; height: 7px; }
    .bar-fill { border-radius: 4px; height: 7px; transition: width 0.3s; }
  </style>
</head>
<body>

<div id="header">
  <h1>🏥 Boston Hospital Finder</h1>
  <p>Find nearby hospitals and explore neighborhood vulnerability across Boston</p>
</div>

<div id="controls">
  <input type="text" id="zip" placeholder="Enter ZIP code (e.g. 02115)" maxlength="5" style="width:220px">
  <select id="radius">
    <option value="1">Within 1 mile</option>
    <option value="5" selected>Within 5 miles</option>
    <option value="10">Within 10 miles</option>
    <option value="25">Within 25 miles</option>
  </select>
  <button onclick="findHospitals()">Search</button>
</div>

<div id="main">
  <div id="map"></div>
  <div id="sidebar">
    <div id="sidebar-header">Enter a ZIP code to find nearby hospitals</div>
    <div id="loading">⏳ Loading data...</div>
    <div id="results"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const HOSPITAL_CSV = "https://data.boston.gov/dataset/d9871e89-2d1e-4ecf-b0de-046f553027c0/resource/6222085d-ee88-45c6-ae40-0c7464620d64/download/hospital-locations.csv";
const VULN_CSV     = "https://bostonopendata-boston.opendata.arcgis.com/api/download/v1/items/34f2c48b670d4b43a617b1540f20efe3/csv?layers=0";

let map, markersLayer;
let vulnByNeigh = {};

function initMap() {
  map = L.map("map").setView([42.3601, -71.0589], 12);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
}

function parseCSV(text) {
  const results = [];
  let i = 0, headers = null;
  function parseField() {
    if (text[i] === '"') {
      i++;
      let val = "";
      while (i < text.length) {
        if (text[i] === '"' && text[i+1] === '"') { val += '"'; i += 2; }
        else if (text[i] === '"') { i++; break; }
        else val += text[i++];
      }
      return val.trim();
    }
    let val = "";
    while (i < text.length && text[i] !== ',' && text[i] !== '\n' && text[i] !== '\r')
      val += text[i++];
    return val.trim();
  }
  function parseLine() {
    const fields = [];
    while (i < text.length && text[i] !== '\n' && text[i] !== '\r') {
      fields.push(parseField());
      if (text[i] === ',') i++;
    }
    if (text[i] === '\r') i++;
    if (text[i] === '\n') i++;
    return fields;
  }
  headers = parseLine().map(h => h.toUpperCase().replace(/^\uFEFF/, "")); // strip BOM
  while (i < text.length) {
    if (text[i] === '\r' || text[i] === '\n') { i++; continue; }
    const vals = parseLine();
    if (!vals.length || (vals.length === 1 && !vals[0])) continue;
    const obj = {};
    headers.forEach((h, idx) => obj[h] = vals[idx] || "");
    results.push(obj);
  }
  return results;
}

function distMiles(lat1, lon1, lat2, lon2) {
  const dLat = (lat2 - lat1) * 69;
  const dLon = (lon2 - lon1) * 52;
  return Math.sqrt(dLat * dLat + dLon * dLon);
}

async function getZipCoords(zip) {
  const res = await fetch(`https://api.zippopotam.us/us/${zip}`);
  if (!res.ok) return null;
  const d = await res.json();
  return {
    lat: parseFloat(d.places[0].latitude),
    lon: parseFloat(d.places[0].longitude),
    city: d.places[0]["place name"],
    state: d.places[0]["state"]
  };
}

function makeMarker(lat, lon) {
  return L.circleMarker([lat, lon], {
    radius: 10,
    fillColor: "#003087",
    color: "#ffffff",
    weight: 2,
    fillOpacity: 0.9
  });
}

// ── Ticket 2: load and index vulnerability CSV by neighborhood name ──
async function loadVulnerability() {
  // Only fetch once; re-use cached data on subsequent searches
  if (Object.keys(vulnByNeigh).length > 0) return;
  try {
    const text = await fetch(VULN_CSV).then(r => r.text());
    const rows = parseCSV(text);
    rows.forEach(row => {
      const name = (row["NAME"] || "").trim();
      if (!name) return;
      const pop  = parseInt(row["POP100_RE"]) || 1;  // total population (avoid /0)
      const hu   = parseInt(row["HU100_RE"])  || 1;  // total housing units
      vulnByNeigh[name.toLowerCase()] = {
        neighborhood: name,
        pop,
        pctElderly:  (parseInt(row["OLDERADULT"]) || 0) / pop,
        pctChild:    (parseInt(row["TOTCHILD"])    || 0) / pop,
        pctLowInc:   (parseInt(row["LOW_TO_NO"])   || 0) / hu,
        pctDisabled: (parseInt(row["TOTDIS"])      || 0) / pop,
        pctLEP:      (parseInt(row["LEP"])         || 0) / pop,
      };
    });
  } catch(e) {
    console.warn("Could not load vulnerability data:", e);
  }
}

// ── Ticket 2: build popup HTML for a hospital + its neighborhood's vuln data ──
function makePopupHTML(h, vuln) {
  const addr = [h["AD"], h["CITY"], h["STATE"]].filter(Boolean).join(", ");

  let vulnHTML = "";
  if (vuln) {
    // Bar colors per category
    const cats = [
      { label: "Elderly residents",        pct: vuln.pctElderly,  color: "#6c63a8" },
      { label: "Children (under 18)",       pct: vuln.pctChild,    color: "#2196a8" },
      { label: "Low-income households",     pct: vuln.pctLowInc,   color: "#c0392b" },
      { label: "People with disabilities",  pct: vuln.pctDisabled, color: "#e67e22" },
      { label: "Limited English speakers",  pct: vuln.pctLEP,      color: "#27a848" },
    ];
    const rows = cats.map(c => {
      const w = Math.min(100, (c.pct * 100).toFixed(1));
      return `
        <div class="vuln-row">
          <div class="vuln-row-header">
            <span class="vuln-row-label">${c.label}</span>
            <span class="vuln-row-pct">${(c.pct * 100).toFixed(1)}%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${w}%;background:${c.color}"></div>
          </div>
        </div>`;
    }).join("");

    vulnHTML = `
      <div class="popup-section">Neighborhood — ${vuln.neighborhood}</div>
      <div style="font-size:11px;color:#888;margin-bottom:8px">
        Population: ${vuln.pop.toLocaleString()}
      </div>
      ${rows}`;
  } else {
    vulnHTML = `<div class="no-vuln" style="margin-top:8px">No vulnerability data for this neighborhood.</div>`;
  }

  return `
    <div class="popup-wrap">
      <div class="popup-name">🏥 ${h["NAME"] || "Hospital"}</div>
      <div class="popup-addr">📍 ${addr || "Address unavailable"}</div>
      ${vulnHTML}
    </div>`;
}

function renderSidebar(matches, markers) {
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";
  matches.forEach((h, idx) => {
    const card = document.createElement("div");
    card.className = "hospital-card";
    card.innerHTML = `
      <div class="hospital-name">
        ${h.NAME}
        <span class="dist-badge">${h.dist.toFixed(1)} mi</span>
      </div>
      <div class="hospital-meta">📍 ${h.AD || ""} &nbsp;|&nbsp; 🏙 ${h.NEIGH || ""}</div>
    `;
    card.onclick = () => {
      document.querySelectorAll(".hospital-card").forEach(c => c.classList.remove("active"));
      card.classList.add("active");
      markers[idx].openPopup();
      map.panTo([h.lat, h.lon]);
    };
    resultsDiv.appendChild(card);
  });
}

async function findHospitals() {
  const zipInput   = document.getElementById("zip").value.trim();
  const radius     = parseFloat(document.getElementById("radius").value);
  const resultsDiv = document.getElementById("results");
  const loading    = document.getElementById("loading");
  const sidebarHdr = document.getElementById("sidebar-header");

  if (!zipInput || zipInput.length < 5) {
    resultsDiv.innerHTML = "<p style='padding:16px;color:#666'>Please enter a valid 5-digit ZIP code.</p>";
    return;
  }

  loading.style.display = "block";
  resultsDiv.innerHTML  = "";
  markersLayer.clearLayers();

  const coords = await getZipCoords(zipInput);
  if (!coords) {
    loading.style.display = "none";
    resultsDiv.innerHTML = "<p style='padding:16px;color:red'>ZIP code not found.</p>";
    return;
  }

  // Fetch hospital CSV and vulnerability data in parallel
  const [hospText] = await Promise.all([
    fetch(HOSPITAL_CSV).then(r => r.text()),
    loadVulnerability()   // populates vulnByNeigh; safe to call multiple times
  ]);

  const hospitals = parseCSV(hospText);
  const coordRx = /\(\s*([-\d.]+),\s*([-\d.]+)\s*\)/;
  const matches = hospitals.map(h => {
    const m = (h["LOCATION"] || "").match(coordRx);
    if (!m) return null;
    const lat = parseFloat(m[1]), lon = parseFloat(m[2]);
    if (!lat || !lon) return null;
    return { ...h, lat, lon, dist: distMiles(coords.lat, coords.lon, lat, lon) };
  }).filter(h => h && h.dist <= radius).sort((a, b) => a.dist - b.dist);

  loading.style.display = "none";

  if (!matches.length) {
    sidebarHdr.textContent = `No hospitals within ${radius} miles of ${zipInput}`;
    resultsDiv.innerHTML = "<p style='padding:16px;color:#666'>Try increasing the search radius.</p>";
    return;
  }

  sidebarHdr.textContent = `${matches.length} hospital${matches.length > 1 ? "s" : ""} within ${radius} miles of ${coords.city}, ${coords.state}`;

  // Ticket 2: build markers with popups
  const markers = matches.map(h => {
    const neigh = (h["NEIGH"] || "").trim().toLowerCase();
    const vuln  = vulnByNeigh[neigh] || null;   // look up by neighborhood name
    const marker = makeMarker(h.lat, h.lon);
    marker.bindPopup(makePopupHTML(h, vuln));    // attach popup
    marker.addTo(markersLayer);
    return marker;
  });

  map.fitBounds(L.featureGroup(markers).getBounds().pad(0.2));
  renderSidebar(matches, markers);
}

document.getElementById("zip").addEventListener("keydown", e => {
  if (e.key === "Enter") findHospitals();
});

initMap();
</script>
</body>
</html>
